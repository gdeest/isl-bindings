name: CI

on:
  push:
    branches: [master, sares]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build all packages
        run: nix develop --command cabal build all

      - name: Run isl-tests
        run: nix develop --command cabal test isl-tests

      - name: Run sare-test
        run: nix develop --command cabal test sare-test

      - name: Run dsl-test
        run: nix develop --command cabal test dsl-test
